name: Build and Test hvloop

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test on ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-20.04
            arch: x86_64
            platform: linux_x64
          - os: ubuntu-20.04
            arch: arm64
            platform: linux_arm64
          - os: macos-11
            arch: x86_64
            platform: macos_x64
          - os: macos-11
            arch: arm64
            platform: macos_arm64
          - os: windows-2019
            arch: x86_64
            platform: windows_x64

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: |
        uv pip install --system -e .[dev,test]

    - name: Run tests
      run: |
        uv run pytest tests/ -v --cov=hvloop --cov-report=xml

    - name: Upload coverage
      if: matrix.os == 'ubuntu-20.04' && matrix.arch == 'x86_64'
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml

  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-20.04, windows-2019, macos-11]

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive

    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Build wheels
      run: |
        uv pip install --system build
        python -m build --wheel --outdir dist/
      env:
        CIBW_BUILD: cp3?-*
        CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux*"
        CIBW_BEFORE_BUILD: "uv pip install --system cmake cython"

    - name: Test wheels
      run: |
        uv pip install --system dist/*.whl
        python -c "import hvloop; print('Import successful')"

    - uses: actions/upload-artifact@v3
      with:
        path: dist/*.whl